name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Installer dependencies
        run: npm ci

      - name: Type-sjekk
        run: npm run typecheck

      - name: Sanity-test beregningsmotor
        run: node src/sanity-test.mjs

      - name: Bygg
        run: npm run build
